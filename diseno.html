    .cta-row{display:flex;flex-wrap:wrap;gap:14px;margin-top:30px}.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;border-radius:18px;padding:16px 22px;font-weight:800;border:1px solid transparent;cursor:pointer}.btn-primary{background:linear-gradient(90deg,var(--purple),var(--purple2),var(--orange));color:#fff;box-shadow:0 0 0 1px rgba(168,85,247,.14),0 18px 50px rgba(124,58,237,.16)}.btn-secondary{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.15);color:rgba(255,255,255,.92)}

      font-weight:700;

    .design-section-head{margin-bottom:18px}

    .study-mobile-list{display:none}

    .project-detail-back{display:inline-flex;margin-bottom:18px}

    .thumb img,.thumb video{width:100%;height:100%;object-fit:cover;display:block;background:transparent;}

}.reels-copy{padding-right:10px}

 .reel-card .project-body{padding:14px 14px 16px}

      if (!Number.isFinite(seconds) || seconds < 0) return "0:00";
      const minutes = Math.floor(seconds / 60);

      document.querySelectorAll("[data-video-shell]").forEach((shell) => {
        if (shell.dataset.bound === "1") return;
        shell.dataset.bound = "1";
        const video = shell.querySelector("[data-video-media]");
        const sound = shell.querySelector("[data-video-sound]");
        const toggle = shell.querySelector("[data-video-toggle]");
        const seek = shell.querySelector("[data-video-seek]");
        const time = shell.querySelector("[data-video-time]");
        const sync = () => {
          if (!video || !seek || !time) return;
          const duration = video.duration || 0;
          seek.value = duration ? (video.currentTime / duration) * 100 : 0;
          time.textContent = formatTime(video.currentTime || 0);
          if (toggle) toggle.innerHTML = video.paused ? `${ico("play_arrow")}` : `${ico("pause")}`;
          if (sound) {
            const isMuted = video.muted || video.volume === 0;
            sound.innerHTML = `${ico(isMuted ? "volume_off" : "volume_up")}`;
            sound.setAttribute("aria-label", isMuted ? "Activar sonido" : "Silenciar");
          }
        };
        if (video) {
          video.addEventListener("loadedmetadata", sync);
          video.addEventListener("timeupdate", sync);
          video.addEventListener("play", sync);
          video.addEventListener("pause", sync);
          video.addEventListener("ended", () => { video.currentTime = 0; video.pause(); sync(); });
        }
        if (toggle && video) {
          toggle.addEventListener("click", (event) => {
            event.preventDefault();
            if (video.paused) video.play();
            else video.pause();
          });
        }
        if (sound && video) {
          sound.addEventListener("click", (event) => {
            event.preventDefault();
            video.muted = !video.muted;
            if (!video.muted && video.volume === 0) video.volume = 1;
            sync();
          });
        }
        if (video) {
          video.addEventListener("click", () => {
            if (video.paused) video.play();
            else video.pause();
          });
        }
        if (seek && video) {
          seek.addEventListener("input", () => {
            const duration = video.duration || 0;
            if (!duration) return;
            video.currentTime = (seek.value / 100) * duration;
            if (time) time.textContent = formatTime(video.currentTime);

        }

      }
      const brandingImage = event.target.closest("[data-branding-image]");
      if(brandingImage){
        event.preventDefault();
        openBrandingModal(brandingImage.getAttribute("data-project"), Number(brandingImage.getAttribute("data-index") || 0));
      }
      const brandingClose = event.target.closest("[data-branding-close]");
      if(brandingClose || event.target.classList.contains("lightbox-backdrop")){
        event.preventDefault();
        closeBrandingModal();
      }
      const designOpen = event.target.closest("[data-design-open]");
      if(designOpen){
        event.preventDefault();
        openDesignModal(designOpen.getAttribute("data-design-open"));
      }
      const designClose = event.target.closest("[data-design-close]");
      if(designClose){
        event.preventDefault();
        closeDesignModal();
      }
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeDesignModal();
        closeBrandingModal();
      }
    });
    render();
  </script>
</body>
</html>
